targets:
  $default:
    builders:
      freezed:
        options:
          map: true
          when: true
          maybeWhen: true
          copyWith: true
      json_serializable:
        options:
          explicit_to_json: true
          include_if_null: false
      isar_generator:
        generate_for:
          include:
            - lib/data/local/schemas/*.dart
      retrofit_generator:
        generate_for:
          include:
            - lib/data/remote/api_service.dart
